name: Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build admin-service image
        uses: docker/build-push-action@v5
        with:
          context: ./admin-service
          push: false
          tags: ecommerce-admin:latest

      - name: Build api-gateway image
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: false
          tags: ecommerce-api-gateway:latest

      - name: Verify Docker images built successfully
        run: |
          echo "✓ Admin service image built"
          echo "✓ API gateway image built"
          echo "✓ Ready for deployment"