services:
  nginx:
    image: nginx:1.25-alpine
    container_name: ecommerce_nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./admin-service:/var/www/admin-service:ro
    depends_on:
      - admin-service
      - api-gateway
    networks:
      - ecommerce_net

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: ecommerce_admin_service
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080

      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ecommerce
      DB_USERNAME: ecommerce
      DB_PASSWORD: ecommerce

      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - ./admin-service:/var/www/admin-service
    depends_on:
      - db
      - redis
    networks:
      - ecommerce_net

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: ecommerce_api_gateway
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000

      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ecommerce
      DB_USER: ecommerce
      DB_PASS: ecommerce

      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev_secret_change_me
    volumes:
      - ./api-gateway:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db
      - redis
    networks:
      - ecommerce_net

  db:
    image: postgres:16-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: ecommerce
      POSTGRES_PASSWORD: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - ecommerce_net

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    ports:
      - "6379:6379"
    networks:
      - ecommerce_net

networks:
  ecommerce_net:

volumes:
  db_data: